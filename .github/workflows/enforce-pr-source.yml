name: Enforce PR source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source:
    name: PR must come from develop
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to main must come from the develop branch. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Source branch is develop, OK."
