  <text x="1152" y="662" class="body muted">主色保留 Material You</text>
  <text x="1152" y="688" class="body muted">的柔和紫色层级。</text>
  <rect x="1128" y="748" width="222" height="58" rx="29" fill="#d0bcff"/>
  <text x="1239" y="783" text-anchor="middle" fill="#241b35" class="h3">导出 UI 套件</text>
