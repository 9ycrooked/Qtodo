  <rect x="324" y="430" width="704" height="86" rx="24" fill="#1f1d28" class="line"/>
  <circle cx="362" cy="473" r="14" fill="#9bd79b"/><text x="362" y="479" text-anchor="middle" fill="#132016" font-family="Arial" font-size="16">✓</text>
