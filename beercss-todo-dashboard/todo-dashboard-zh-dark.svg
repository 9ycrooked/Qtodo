<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg{fill:#111018}.shell{fill:#1b1922}.surface{fill:#24212d}.surface2{fill:#302c3a}.primary{fill:#d0bcff}
      .primaryBox{fill:#3d3358}.green{fill:#9bd79b}.greenBox{fill:#233b2a}.amber{fill:#ffd28a}.amberBox{fill:#4b3820}
      .ink{fill:#f3edf7}.muted{fill:#cac4d0}.line{stroke:#4a4458;stroke-width:1.5}.shadow{filter:url(#shadow)}
      .h1{font:700 34px "Microsoft YaHei", Arial, sans-serif}.h2{font:700 22px "Microsoft YaHei", Arial, sans-serif}.h3{font:700 16px "Microsoft YaHei", Arial, sans-serif}
      .body{font:400 14px "Microsoft YaHei", Arial, sans-serif}.label{font:700 12px "Microsoft YaHei", Arial, sans-serif}.tiny{font:400 12px "Microsoft YaHei", Arial, sans-serif}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <rect x="28" y="28" width="1384" height="844" rx="34" class="shell"/>
  <rect x="52" y="52" width="210" height="796" rx="28" class="surface shadow"/>
  <rect x="286" y="52" width="780" height="796" rx="28" class="surface shadow"/>
  <rect x="1090" y="52" width="298" height="796" rx="28" class="surface shadow"/>
