  <text x="1152" y="662" class="body muted">圆角标签和清晰的</text>
  <text x="1152" y="688" class="body muted">Material 层级。</text>
  <rect x="1128" y="748" width="222" height="58" rx="29" class="primary"/>
  <text x="1239" y="783" text-anchor="middle" fill="#fff" class="h3">导出 UI 套件</text>
