  <circle cx="1239" cy="432" r="78" fill="none" stroke="#ece6f0" stroke-width="20"/>
  <path d="M1239 354 A78 78 0 1 1 1183 486" fill="none" stroke="#6750a4" stroke-width="20" stroke-linecap="round"/>
  <text x="1239" y="426" text-anchor="middle" class="h1 ink">62%</text>
