<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg{fill:#f8f6fb}.surface{fill:#fffbfe}.surface2{fill:#f0edf6}.primary{fill:#6750a4}
      .primaryLight{fill:#eaddff}.green{fill:#2e7d32}.greenLight{fill:#dff3df}
      .amber{fill:#9a6400}.amberLight{fill:#ffe6b5}.ink{fill:#1d1b20}.muted{fill:#6f6a78}
      .line{stroke:#ddd7e8;stroke-width:1.5}.shadow{filter:url(#shadow)}
      .h1{font:700 34px "Microsoft YaHei", Arial, sans-serif}.h2{font:700 22px "Microsoft YaHei", Arial, sans-serif}.h3{font:700 16px "Microsoft YaHei", Arial, sans-serif}
      .body{font:400 14px "Microsoft YaHei", Arial, sans-serif}.label{font:700 12px "Microsoft YaHei", Arial, sans-serif}.tiny{font:400 12px "Microsoft YaHei", Arial, sans-serif}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#3f3655" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <rect x="28" y="28" width="1384" height="844" rx="34" fill="#ebe7f2"/>
